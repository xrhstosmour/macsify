# Base configuration.
command_timeout = 10000
add_newline = true

# Command duration.
[cmd_duration]
min_time = 4
show_milliseconds = false
format = "уұҺ« $duration "
style = "bold italic #87A752"

# Directory.
[directory]
truncation_length = 5
format = "[$path]($style)[$lock_symbol]($lock_style) "
style = "bold cyan"

# Hostname.
[hostname]
ssh_only = false
format = "<$hostname>"
trim_at = "-"
style = "bold dimmed white"
disabled = true

# Character.
[character]
success_symbol = "[вһң](bold green) "
error_symbol = "[вң–](bold red) "

# Username.
[username]
show_always = false
style_user = "bold dimmed blue"
style_root = "bold dimmed red"

# Packages.
[package]
disabled = false

# Background jobs.
[jobs]
format = "[$symbol$jobs]($style) "
symbol = "рҹ”ғ "
style = "bold blue"

# Git.
[git_branch]
format = "on [$symbol$branch]($style) "
symbol = "оӮ "
style = "bold yellow"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
conflicted = "у°һҮ "
ahead = "у°¶Ј Г—${count} "
behind = "у°¶Ў Г—${count} "
diverged = "у°¶Ј Г—${ahead_count} у°¶Ў Г—${behind_count} "
untracked = "у°Үҳ Г—${count} "
stashed = "у°Ҹ— Г—${count} "
modified = "у°Ҹ« Г—${count} "
staged = "у°җ– Г—${count} "
renamed = "у°‘• Г—${count} "
deleted = "у°Ҷҙ Г—${count} "
style = "bright-white"
format = "$all_status$ahead_behind| "

# Languages & Tools.
[nodejs]
format = "оңҳ $version "
style = "bold green"

[rust]
format = "оһЁ $version "
style = "bold red"

[python]
format = "оҳҶ $version "
style = "bold blue"

[golang]
format = "оҳ§ $version "
style = "bold cyan"

[java]
format = "оңё $version "
style = "bold purple"

[kubernetes]
format = "уұ„„ $context "
style = "bold blue"

[docker_context]
format = "оһ° $context "
style = "blue bold"

[c]
format = "оҳһ $version "
style = "bold orange"

[dotnet]
format = "оқҝ $version "
style = "bold blue"

[dart]
format = "оһҳ $version "
style = "bold cyan"

[ruby]
format = "оһ‘ $version "
style = "bold red"

[php]
format = "у°‘„ $version "
style = "bold purple"

[lua]
format = "оҳ  $version "
style = "bold blue"

[cpp]
format = "оҳқ $version "
style = "bold blue"

[aws]
disabled = true
